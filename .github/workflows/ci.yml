name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libglib2.0-0 libsm6 libxext6 libxrender-dev libgomp1

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml', '**/setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python --version
          pip install --upgrade pip
          pip install cython numpy pytest setuptools
          # Installer les dépendances de test (ajustez selon vos besoins)
          pip install opencv-python-headless mediapipe matplotlib scipy
          # Compiler les extensions Cython (optionnel si fait par -e)
          python setup.py build_ext --inplace
          pip install -e .

      - name: Display installed packages
        run: pip list

      - name: Run tests
        run: pytest tests/ -v --tb=short