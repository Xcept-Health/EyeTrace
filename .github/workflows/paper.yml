name: JOSS paper build
on: [push]
jobs:
  paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper.md
      - uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper.pdf