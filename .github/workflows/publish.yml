name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: |
          pip install --upgrade pip
          pip install cython numpy build

      - name: Clean dist folder
        run: rm -rf dist/   # Supprime tout l'ancien contenu

      - name: Build source distribution only
        run: python -m build --sdist

      - name: Remove any remaining wheels (safety)
        run: find dist/ -name "*.whl" -delete

      - name: Check dist (should only contain .tar.gz)
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          attestations: false