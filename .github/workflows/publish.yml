  name: Publish to PyPI

  on:
    release:
      types: [published]

  jobs:
    deploy:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.10'

        - name: Install dependencies
          run: pip install cython numpy setuptools twine

        - name: Build sdist only
          run: python setup.py sdist

        - name: Verify only tar.gz present
          run: |
            ls -la dist/
            test $(ls dist/*.whl 2>/dev/null | wc -l) -eq 0 && echo "OK no wheel" || (echo "WHEEL FOUND - removing" && rm dist/*.whl)

        - name: Publish
          run: twine upload dist/*.tar.gz
          env:
            TWINE_USERNAME: __token__
            TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}